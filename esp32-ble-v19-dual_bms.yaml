        id(pw1_avg_count) += 1;
      int window = (int) id(pw_avg_window).state;
      if (window < 1) window = 1;
      if (window > 100) window = 100;
      int n = id(pw1_avg_count) < window ? id(pw1_avg_count) : window;
      float sum = 0;
      int pos = id(pw1_avg_idx);
      for (int i = 0; i < n; i++) {
        pos = (pos + 99) % 100;  // recule d'une case (les n plus récentes)
        sum += id(pw1_avg_buffer)[pos];
      }
      return sum / n;

  # Restauration réseau : import des helpers input_number de HA (2e source de
  # mémoire). One-shot par compteur — seule la première valeur valide reçue
  # après démarrage est fusionnée ; les mises à jour suivantes (dont l'écho de
  # notre propre miroir 30 s) sont ignorées. Fusion par max() avec l'offset
  # déjà restauré de la NVS au boot : la valeur HA ne peut que relever le
  # total, jamais le faire reculer ni le doubler.
  - platform: homeassistant
    id: ha_p0in
    entity_id: input_number.jk_bms_bms0_energy_in
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(p0in_restored)) return;
            if (!std::isfinite(x) || x < 0) return;
            id(p0in_offset) = std::max(id(p0in_offset), x);
            id(p0in_restored) = true;
  - platform: homeassistant
    id: ha_p0out
    entity_id: input_number.jk_bms_bms0_energy_out
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(p0out_restored)) return;
            if (!std::isfinite(x) || x < 0) return;
            id(p0out_offset) = std::max(id(p0out_offset), x);
            id(p0out_restored) = true;
  - platform: homeassistant
    id: ha_p1in
    entity_id: input_number.jk_bms_bms1_energy_in
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(p1in_restored)) return;
            if (!std::isfinite(x) || x < 0) return;
            id(p1in_offset) = std::max(id(p1in_offset), x);
            id(p1in_restored) = true;
  - platform: homeassistant
    id: ha_p1out
    entity_id: input_number.jk_bms_bms1_energy_out
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(p1out_restored)) return;
            if (!std::isfinite(x) || x < 0) return;
            id(p1out_offset) = std::max(id(p1out_offset), x);
            id(p1out_restored) = true;

  # Compteurs d'énergie cumulés persistants : total = offset restauré du helper
  # HA (mémoire réseau) + accumulé C++ depuis le boot. Le capteur brut repart
  # de 0 à chaque redémarrage, l'offset absorbe l'historique : le total ne
  # recule jamais (clamp >= 0, reset explicite via les boutons ci-dessous).
  - platform: template
    name: "energy in total"
    id: bms0_energy_in_total
    device_id: device0
    unit_of_measurement: Wh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float raw = id(bms0_energy_in_raw).state;
      if (isnan(raw)) raw = 0;
      float total = id(p0in_offset) + raw;
      return total < 0 ? 0 : total;
  - platform: template
    name: "energy out total"
    id: bms0_energy_out_total
    device_id: device0
    unit_of_measurement: Wh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      float raw = id(bms0_energy_out_raw).state;
      if (isnan(raw)) raw = 0;
      float total = id(p0out_offset) + raw;
      return total < 0 ? 0 : total;
  - platform: template
    name: "energy in total"

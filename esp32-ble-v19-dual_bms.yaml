substitutions:
  name: jk-bms
  bms0: "${name} bms0"
  bms1: "${name} bms1"
  device_description: "Monitor and control two JK-BMS v19 via bluetooth"
  external_components_source: github://C00L4LIFE/esphome-jk-bms@main
  # Please use "JK02_24S" if you own a old JK-BMS < hardware version 11.0 (hardware version >= 6.0 and < 11.0)
  # Please use "JK02_32S" if you own a new JK-BMS >= hardware version 11.0 (f.e. JK-B2A8S20P hw 11.XW, sw 11.26)
  # Please use "JK04" if you have some old JK-BMS <= hardware version 3.0 (f.e. JK-B2A16S hw 3.0, sw. 3.3.0)
  bms0_protocol_version: JK02_32S
  bms1_protocol_version: JK02_32S

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-jk-bms"
    version: 3.0.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"
  on_boot:
    # Restauration immédiate des compteurs d'énergie depuis la NVS (copie
    # locale) : les totaux sont corrects dès le boot, même si Home Assistant
    # est injoignable. La valeur du helper HA, quand elle arrive, ne peut que
    # relever l'offset (fusion max, voir les imports homeassistant plus bas).
    priority: -100
    then:
      - lambda: |-
          id(p0in_offset) = id(nvs_p0in);
          id(p0out_offset) = id(nvs_p0out);
          id(p1in_offset) = id(nvs_p1in);
          id(p1out_offset) = id(nvs_p1out);

# Sauvegarde NVS des compteurs : écriture au plus toutes les 6 h (4/jour,
# usure négligeable sur des décennies) + flush automatique à chaque reboot
# propre (OTA, restart) par le syncer de préférences. La flash n'est donc
# sollicitée que rarement, contrairement à une persistance à la seconde.
preferences:
  flash_write_interval: 6h

esp32:
  #board: wemos_d1_mini32
  variant: esp32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - switch.turn_off: ble_client_switch1
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG
  logs:
    esp32_ble_tracker: INFO
    esp32_ble_client: INFO

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:
  encryption:
    key: !secret api_encryption_key

# Mémoire réseau des compteurs d'énergie cumulés (energy in/out total) : rien
# n'est persisté en flash (vieillissement NVS). Le stockage est fait dans
# 4 helpers input_number de Home Assistant (jamais "unavailable", contrairement
# aux entités du device qui perdent leur état à chaque reboot) :
#   input_number.jk_bms_bms0_energy_in    input_number.jk_bms_bms0_energy_out
#   input_number.jk_bms_bms1_energy_in    input_number.jk_bms_bms1_energy_out
# L'ESP les met à jour toutes les 30 s par appel de service (nécessite
# d'autoriser le device à exécuter des actions HA : Paramètres > Appareils >
# ESPHome > jk-bms > Configurer > "Allow the device to perform actions").
# Au boot, il relit le helper (import ci-dessous) et restaure l'offset en
# one-shot. Pas de composant MQTT : ses ~150 wrappers d'entités obligatoires
# épuisaient le heap (crash LoadProhibited + échecs de handshake WiFi).
interval:
  # Toutes les 30 s : (1) copie des totaux dans les globals NVS — sans garde,
  # car l'offset intègre déjà l'historique NVS dès le boot, le total courant
  # est donc toujours >= à la valeur stockée ; l'écriture flash réelle reste
  # limitée par flash_write_interval (6 h) ou au shutdown. (2) Miroir vers les
  # helpers HA, gardé par les flags "restored" pour ne jamais écraser la
  # mémoire réseau avec un compteur repartant de zéro avant restauration.
  - interval: 30s
    then:
      - lambda: |-
          auto keep = [](float &dst, float v) { if (std::isfinite(v)) dst = v; };
          keep(id(nvs_p0in), id(bms0_energy_in_total).state);
          keep(id(nvs_p0out), id(bms0_energy_out_total).state);
          keep(id(nvs_p1in), id(bms1_energy_in_total).state);
          keep(id(nvs_p1out), id(bms1_energy_out_total).state);
      - if:
          condition:
            lambda: 'return id(p0in_restored) && id(p0out_restored);'
          then:
            - homeassistant.action:
                action: input_number.set_value
                data:
                  entity_id: input_number.jk_bms_bms0_energy_in
                  value: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "%.2f", id(bms0_energy_in_total).state);
                    return std::string(buf);
            - homeassistant.action:
                action: input_number.set_value
                data:
                  entity_id: input_number.jk_bms_bms0_energy_out
                  value: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "%.2f", id(bms0_energy_out_total).state);
                    return std::string(buf);
      - if:
          condition:
            lambda: 'return id(p1in_restored) && id(p1out_restored);'
          then:
            - homeassistant.action:
                action: input_number.set_value
                data:
                  entity_id: input_number.jk_bms_bms1_energy_in
                  value: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "%.2f", id(bms1_energy_in_total).state);
                    return std::string(buf);
            - homeassistant.action:
                action: input_number.set_value
                data:
                  entity_id: input_number.jk_bms_bms1_energy_out
                  value: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "%.2f", id(bms1_energy_out_total).state);
                    return std::string(buf);

# Built-in dashboard to view and control all entities below from a browser, f.e. http://jk-bms.local
web_server:
  version: 3

# Needed for the "charge/discharge finish time" text sensors below. SNTP works standalone
# (WiFi + internet only). If you use Home Assistant you can use its clock instead:
#   - platform: homeassistant
#     id: rtc_time
time:
  - platform: sntp
    id: rtc_time
    timezone: America/Port-au-Prince

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: !secret bms0_mac_address
    id: client0
  - mac_address: !secret bms1_mac_address
    id: client1

jk_bms_ble:
  - ble_client_id: client0
    protocol_version: ${bms0_protocol_version}
    throttle: 5s
    id: bms0
    time_id: rtc_time
  - ble_client_id: client1
    protocol_version: ${bms1_protocol_version}
    throttle: 5s
    id: bms1
    time_id: rtc_time

binary_sensor:

button:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    retrieve_settings:
      name: "retrieve settings"
      device_id: device0
    retrieve_device_info:
      name: "retrieve device info"
      device_id: device0
    retrieve_logbook:
      name: "retrieve logbook"
      device_id: device0
    shutdown:
      name: "shutdown"
      device_id: device0
    restart:
      name: "restart"
      device_id: device0
    factory_reset:
      name: "factory reset"
      device_id: device0

  - platform: jk_bms_ble
    jk_bms_ble_id: bms1
    retrieve_settings:
      name: "retrieve settings"
      device_id: device1
    retrieve_device_info:
      name: "retrieve device info"
      device_id: device1
    retrieve_logbook:
      name: "retrieve logbook"
      device_id: device1
    shutdown:
      name: "shutdown"
      device_id: device1
    restart:
      name: "restart"
      device_id: device1
    factory_reset:
      name: "factory reset"
      device_id: device1

  # Remise à zéro des compteurs d'énergie cumulés (energy in/out total).
  # L'offset devient l'opposé de l'accumulé C++ courant (le total retombe à 0
  # sans redémarrer le module) et les helpers HA sont immédiatement remis à 0
  # pour que l'ancienne valeur ne revienne pas au prochain boot.
  - platform: template
    name: "reset energy counters"
    device_id: device0
    entity_category: config
    icon: "mdi:counter"
    on_press:
      - lambda: |-
          float in_raw = id(bms0_energy_in_raw).state;
          float out_raw = id(bms0_energy_out_raw).state;
          id(p0in_offset) = isnan(in_raw) ? 0 : -in_raw;
          id(p0out_offset) = isnan(out_raw) ? 0 : -out_raw;
          id(p0in_restored) = true;
          id(p0out_restored) = true;
          id(nvs_p0in) = 0;
          id(nvs_p0out) = 0;
          global_preferences->sync();
          id(bms0_energy_in_total).update();
          id(bms0_energy_out_total).update();
      - homeassistant.action:
          action: input_number.set_value
          data:
            entity_id: input_number.jk_bms_bms0_energy_in
            value: "0"
      - homeassistant.action:
          action: input_number.set_value
          data:
            entity_id: input_number.jk_bms_bms0_energy_out
            value: "0"
  - platform: template
    name: "reset energy counters"
    device_id: device1
    entity_category: config
    icon: "mdi:counter"
    on_press:
      - lambda: |-
          float in_raw = id(bms1_energy_in_raw).state;
          float out_raw = id(bms1_energy_out_raw).state;
          id(p1in_offset) = isnan(in_raw) ? 0 : -in_raw;
          id(p1out_offset) = isnan(out_raw) ? 0 : -out_raw;
          id(p1in_restored) = true;
          id(p1out_restored) = true;
          id(nvs_p1in) = 0;
          id(nvs_p1out) = 0;
          global_preferences->sync();
          id(bms1_energy_in_total).update();
          id(bms1_energy_out_total).update();
      - homeassistant.action:
          action: input_number.set_value
          data:
            entity_id: input_number.jk_bms_bms1_energy_in
            value: "0"
      - homeassistant.action:
          action: input_number.set_value
          data:
            entity_id: input_number.jk_bms_bms1_energy_out
            value: "0"

# Tables circulaires du lissage de puissance batterie (une par BMS). Implémentées à
# la main (plutôt que sliding_window_moving_average) parce que la taille de fenêtre
# et l'intervalle du filtre ESPHome sont figés à la compilation, alors qu'ici ils
# sont réglables à chaud via les numbers "Batterie Lissage ..." ci-dessous.
globals:
  - id: pw0_avg_buffer
    type: float[100]
  - id: pw0_avg_idx
    type: int
    initial_value: '0'
  - id: pw0_avg_count
    type: int
    initial_value: '0'
  - id: pw0_avg_last_ms
    type: uint32_t
    initial_value: '0'
  - id: pw1_avg_buffer
    type: float[100]
  - id: pw1_avg_idx
    type: int
    initial_value: '0'
  - id: pw1_avg_count
    type: int
    initial_value: '0'
  - id: pw1_avg_last_ms
    type: uint32_t
    initial_value: '0'
  # Persistance réseau des compteurs d'énergie : offset = valeur restaurée du
  # broker MQTT au boot (peut devenir négatif après un reset), restored = flag
  # one-shot pour n'accepter que le premier message retenu après démarrage.
  - id: p0in_offset
    type: float
    initial_value: '0'
  - id: p0out_offset
    type: float
    initial_value: '0'
  - id: p1in_offset
    type: float
    initial_value: '0'
  - id: p1out_offset
    type: float
    initial_value: '0'
  - id: p0in_restored
    type: bool
    initial_value: 'false'
  - id: p0out_restored
    type: bool
    initial_value: 'false'
  - id: p1in_restored
    type: bool
    initial_value: 'false'
  - id: p1out_restored
    type: bool
    initial_value: 'false'
  # Copie NVS des totaux (2e source de mémoire, locale). Mise à jour en RAM
  # toutes les 30 s ; l'écriture flash réelle n'a lieu qu'aux 6 h (voir
  # preferences:) ou au shutdown propre. restore_value la recharge au boot.
  - id: nvs_p0in
    type: float
    restore_value: true
    initial_value: '0'
  - id: nvs_p0out
    type: float
    restore_value: true
    initial_value: '0'
  - id: nvs_p1in
    type: float
    restore_value: true
    initial_value: '0'
  - id: nvs_p1out
    type: float
    restore_value: true
    initial_value: '0'


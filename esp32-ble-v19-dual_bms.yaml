  # Puissance bms0 signée (+ = charge) lissée sur la table circulaire : une
  # lecture par intervalle dans la case 0..99 (retour à 0 après 99), moyenne =
  # somme des cases / nombre de cases ; tant que la table n'est pas pleine,
  # seules les cases alimentées comptent.
  - platform: template
    name: "bms0 power average"
    id: bms0_power_avg
    device_id: device0
    unit_of_measurement: W
    device_class: power
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      float v = id(bms0_power).state;
      if (isnan(v)) return {};
      uint32_t now = millis();
      uint32_t interval_ms = (uint32_t) id(pw_avg_interval).state * 1000;
      if (interval_ms < 1000) interval_ms = 1000;
      if (id(pw0_avg_count) > 0 && (now - id(pw0_avg_last_ms)) < interval_ms)
        return {};  // pas encore l'heure d'échantillonner
      id(pw0_avg_last_ms) = now;
      id(pw0_avg_buffer)[id(pw0_avg_idx)] = v;
      id(pw0_avg_idx) = (id(pw0_avg_idx) + 1) % 100;
      if (id(pw0_avg_count) < 100)
        id(pw0_avg_count) += 1;
      int window = (int) id(pw_avg_window).state;
      if (window < 1) window = 1;
      if (window > 100) window = 100;
      int n = id(pw0_avg_count) < window ? id(pw0_avg_count) : window;
      float sum = 0;
      int pos = id(pw0_avg_idx);
      for (int i = 0; i < n; i++) {
        pos = (pos + 99) % 100;  // recule d'une case (les n plus récentes)
        sum += id(pw0_avg_buffer)[pos];
      }
      return sum / n;

  # Puissance bms1 signée (+ = charge) lissée sur sa propre table circulaire,
  # même mécanisme que bms0 ci-dessus.
  - platform: template
    name: "bms1 power average"
